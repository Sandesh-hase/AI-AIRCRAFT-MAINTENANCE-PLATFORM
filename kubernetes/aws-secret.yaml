# -----------------------------------------------------------------------------
# AWS Credentials Secret
#
# This Kubernetes Secret stores the AWS credentials required by the backend
# application to access Amazon Bedrock.
#
# Replace the placeholder values with your own AWS credentials before deploying.
# -----------------------------------------------------------------------------

apiVersion: v1
kind: Secret

metadata:
  name: aws-credentials

type: Opaque

stringData:
  AWS_ACCESS_KEY_ID:  ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY:  ${AWS_SECRET_ACCESS_KEY}
  AWS_REGION: "us-east-1"